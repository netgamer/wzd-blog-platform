{{ if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "NewsArticle",
  "headline": {{ .Title | jsonify }},
  "description": {{ (.Description | default (.Summary | plainify | truncate 160)) | jsonify }},
  "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02T15:04:05Z07:00" }}",
  {{ if .Params.image }}"image": ["{{ printf "%s%s" .Site.BaseURL (strings.TrimPrefix "/" .Params.image) }}"],{{ end }}
  "author": {
    "@type": "Person",
    "name": {{ (.Params.author | default .Site.Params.author) | jsonify }}
  },
  "publisher": {
    "@type": "Organization",
    "name": {{ .Site.Title | jsonify }},
    "url": {{ .Site.BaseURL | jsonify }}
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": {{ .Permalink | jsonify }}
  }{{ if .Params.tags }},
  "keywords": {{ .Params.tags | jsonify }}{{ end }}
}
</script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {"@type": "ListItem", "position": 1, "name": "홈", "item": {{ .Site.BaseURL | jsonify }}},
    {{ range $i, $cat := .Params.categories }}
    {"@type": "ListItem", "position": 2, "name": {{ $cat | jsonify }}, "item": {{ printf "%scategories/%s/" $.Site.BaseURL ($cat | urlize) | jsonify }}},
    {{ end }}
    {"@type": "ListItem", "position": 3, "name": {{ .Title | jsonify }}}
  ]
}
</script>
{{ else if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": {{ .Site.Title | jsonify }},
  "url": {{ .Site.BaseURL | jsonify }},
  "description": {{ .Site.Params.description | jsonify }},
  "potentialAction": {
    "@type": "SearchAction",
    "target": {
      "@type": "EntryPoint",
      "urlTemplate": {{ printf "%s?q={search_term_string}" .Site.BaseURL | jsonify }}
    },
    "query-input": "required name=search_term_string"
  }
}
</script>
{{ else }}
{{/* Category/Tag pages */}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "CollectionPage",
  "name": {{ .Title | jsonify }},
  "url": {{ .Permalink | jsonify }},
  "description": {{ printf "%s 관련 최신 뉴스와 트렌드 분석" .Title | jsonify }},
  "isPartOf": {
    "@type": "WebSite",
    "name": {{ .Site.Title | jsonify }},
    "url": {{ .Site.BaseURL | jsonify }}
  }
}
</script>
{{ end }}
