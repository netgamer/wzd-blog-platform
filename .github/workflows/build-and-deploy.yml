name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      blog_id:
        description: 'Blog ID to build (leave empty for all enabled)'
        required: false

# Grant GITHUB_TOKEN permissions to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.147.4'
          extended: true

      - name: Build tax-yearend
        run: |
          hugo --source sites/tax-yearend \
               --themesDir ${{ github.workspace }}/themes \
               --destination ${{ github.workspace }}/public \
               -F --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
