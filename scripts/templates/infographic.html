<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1200">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Pretendard Variable', Pretendard, 'Noto Color Emoji', -apple-system, sans-serif;
  width: 1200px;
  height: 630px;
  overflow: hidden;
  background: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 50%, #f5f0ff 100%);
}

.card {
  width: 1200px;
  height: 630px;
  padding: 40px 50px;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* 상단 제목 영역 */
.header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
}

.header-badge {
  background: #1a56db;
  color: white;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
}

.title {
  font-size: 28px;
  font-weight: 800;
  color: #1a1a2e;
  line-height: 1.3;
}

.title .highlight {
  color: #1a56db;
}

.subtitle {
  font-size: 15px;
  color: #6b7280;
  margin-bottom: 28px;
  padding-left: 4px;
}

/* 메인 콘텐츠 - 카드 그리드 */
.content {
  display: flex;
  gap: 20px;
  flex: 1;
}

/* 정보 카드 */
.info-card {
  flex: 1;
  background: white;
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  display: flex;
  flex-direction: column;
  border: 1px solid rgba(0,0,0,0.04);
}

.info-card.accent {
  background: linear-gradient(135deg, #1a56db, #3b82f6);
  color: white;
}

.info-card.accent .card-title { color: white; }
.info-card.accent .card-icon { background: rgba(255,255,255,0.2); }
.info-card.accent .card-text { color: rgba(255,255,255,0.9); }
.info-card.accent .card-list li { color: rgba(255,255,255,0.9); }
.info-card.accent .card-list li::before { color: rgba(255,255,255,0.7); }

.card-icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  background: #eef2ff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  margin-bottom: 14px;
}

.card-title {
  font-size: 17px;
  font-weight: 700;
  color: #1a1a2e;
  margin-bottom: 10px;
}

.card-text {
  font-size: 13.5px;
  color: #4b5563;
  line-height: 1.7;
  flex: 1;
}

.card-list {
  list-style: none;
  flex: 1;
}

.card-list li {
  font-size: 13.5px;
  color: #4b5563;
  line-height: 1.6;
  padding: 3px 0;
  display: flex;
  align-items: flex-start;
  gap: 6px;
}

.card-list li::before {
  content: '✓';
  color: #1a56db;
  font-weight: 700;
  flex-shrink: 0;
}

/* 하단 플로우 */
.flow {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 20px;
  padding: 16px 0;
}

.flow-step {
  background: white;
  border: 2px solid #e5e7eb;
  border-radius: 12px;
  padding: 10px 18px;
  font-size: 13px;
  font-weight: 600;
  color: #374151;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}

.flow-step.active {
  background: #1a56db;
  border-color: #1a56db;
  color: white;
}

.flow-step .step-icon {
  font-size: 18px;
}

.flow-arrow {
  font-size: 20px;
  color: #9ca3af;
}

/* 하단 출처 */
.footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 8px;
}

.footer-left {
  font-size: 12px;
  color: #9ca3af;
}

.footer-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.footer-logo {
  font-size: 14px;
  font-weight: 700;
  color: #1a56db;
}

/* 장식 요소 */
.deco-circle {
  position: absolute;
  border-radius: 50%;
  opacity: 0.05;
  background: #1a56db;
}

.deco-1 { width: 200px; height: 200px; top: -60px; right: -40px; }
.deco-2 { width: 150px; height: 150px; bottom: -30px; left: -30px; }
</style>
</head>
<body>
<div class="card">
  <div class="deco-circle deco-1"></div>
  <div class="deco-circle deco-2"></div>

  <div class="header">
    <span class="header-badge" id="badge">{{BADGE}}</span>
    <h1 class="title" id="title">{{TITLE}}</h1>
  </div>

  <p class="subtitle" id="subtitle">{{SUBTITLE}}</p>

  <div class="content" id="cards">
    <!-- Cards injected by script -->
  </div>

  <div class="flow" id="flow">
    <!-- Flow steps injected by script -->
  </div>

  <div class="footer">
    <span class="footer-left" id="footer-source">{{SOURCE}}</span>
    <div class="footer-right">
      <span class="footer-logo">연말정산 가이드</span>
    </div>
  </div>
</div>
</body>
</html>
