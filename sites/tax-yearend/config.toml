baseURL = 'https://netgamer.github.io/wzd-blog-platform/'
languageCode = 'ko'
title = '오늘의 트렌드 - 실시간 이슈·정책·생활 가이드'
theme = 'wzd-gov-theme'
[pagination]
  pagerSize = 10
enableRobotsTXT = true
canonifyURLs = true

[params]
  description = '실시간 트렌드 뉴스, 경제, 건강, IT, 연예, 스포츠 등 오늘의 핫이슈를 빠르고 깊이 있게 전달합니다.'
  author = '오늘의 트렌드'
  gaId = 'G-X1VVEB9LME'
  adsenseId = ''
  naverVerification = ''
  keywords = ['오늘의 트렌드', '실시간 뉴스', '경제 뉴스', '건강 정보', 'IT 트렌드', '연예 뉴스', '스포츠 뉴스', '정책 정보', '생활 정보']

[taxonomies]
  category = 'categories'
  tag = 'tags'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

[outputs]
  home = ['HTML', 'RSS']
  section = ['HTML', 'RSS', 'JSON']

[sitemap]
  changefreq = 'daily'
  priority = 0.7

[related]
  threshold = 80
  includeNewer = true
  toLower = true
  [[related.indices]]
    name = 'tags'
    weight = 100
  [[related.indices]]
    name = 'categories'
    weight = 80
