baseURL = 'https://netgamer.github.io/wzd-blog-platform/'
languageCode = 'ko'
title = '오늘의 정책 - 한국 정책·지원금·생활 가이드'
theme = 'wzd-gov-theme'
[pagination]
  pagerSize = 10
enableRobotsTXT = true
canonifyURLs = true

[params]
  description = '종합소득세, 연말정산, 실업급여, 청년지원금, 근로장려금, 문화의날 등 한국 정책과 생활 정보를 쉽고 빠르게 안내합니다.'
  author = '정책가이드'
  gaId = 'G-X1VVEB9LME'
  adsenseId = ''
  keywords = ['한국 정책', '지원금', '종합소득세', '연말정산', '실업급여', '청년정책', '근로장려금', '문화의날']

[taxonomies]
  category = 'categories'
  tag = 'tags'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

[outputs]
  home = ['HTML', 'RSS']
  section = ['HTML', 'RSS']

[sitemap]
  changefreq = 'daily'
  priority = 0.7

[related]
  threshold = 80
  includeNewer = true
  toLower = true
  [[related.indices]]
    name = 'tags'
    weight = 100
  [[related.indices]]
    name = 'categories'
    weight = 80
